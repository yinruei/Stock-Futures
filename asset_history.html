<!DOCTYPE html>

    <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})()</script>

        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* ── Dark Mode ── */

        html.dark .bg-white { background-color: #1e293b !important; }
        html.dark .bg-gray-100 { background-color: #0f172a !important; }
        html.dark .bg-gray-50 { background-color: #1e293b !important; }
        html.dark .text-gray-900 { color: #f1f5f9 !important; }
        html.dark .text-gray-800 { color: #e2e8f0 !important; }
        html.dark .text-gray-700 { color: #cbd5e1 !important; }
        html.dark .text-gray-600 { color: #94a3b8 !important; }
        html.dark .text-gray-500 { color: #64748b !important; }
        html.dark .text-gray-400 { color: #475569 !important; }
        html.dark .border, html.dark .border-b { border-color: #334155 !important; }
        html.dark .border-gray-100, html.dark .border-gray-200 { border-color: #334155 !important; }
        html.dark .border-emerald-100, html.dark .border-emerald-200 { border-color: #065f46 !important; }
        html.dark [class*="divide-"] > * { border-color: #334155 !important; }
        html.dark input:not([type=range]), html.dark select {
            background-color: #1e293b !important;
            color: #e2e8f0 !important;

        html.dark .hover\:bg-gray-50:hover,
        html.dark .hover\:bg-gray-100:hover { background-color: #334155 !important; }
        html.dark .shadow-md, html.dark .shadow-sm,
        html.dark .shadow-2xl { box-shadow: 0 4px 24px rgba(0,0,0,0.5) !important; }

</head>
<body class="bg-gray-100 text-gray-800 p-4 md:p-8">

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">

                    <input type="email" id="authEmail" placeholder="your@email.com"

                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                    <input type="password" id="authPassword" placeholder="至少 6 個字元"

                    <div id="forgotPasswordLink" class="text-right mt-1">

            <!-- 忘記密碼 -->

                <div>

                    <input type="email" id="forgotEmail" placeholder="your@email.com"

                    <input type="password" id="confirmPassword" placeholder="再輸入一次"

                <div id="resetMessage" class="hidden text-sm p-3 rounded-lg"></div>

    <div class="max-w-6xl mx-auto space-y-6">

        <!-- 導覽列 -->
        <div class="flex gap-1 sm:gap-2 bg-white rounded-xl shadow-md p-2 items-center">

            <a href="trading_journal.html" class="flex-1 text-center py-2 px-1 sm:px-4 rounded-lg font-semibold text-xs sm:text-sm text-gray-600 hover:bg-gray-100 transition">📓 <span class="sm:hidden">交易</span><span class="hidden sm:inline">交易紀錄</span></a>

            <button onclick="toggleTheme()" class="p-2 px-2 sm:px-3 rounded-lg text-gray-600 hover:bg-gray-100 transition text-xl" title="切換日夜間模式"><span id="themeIcon">🌙</span></button>

        <!-- 標題 -->

            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-b-4 border-blue-500">
                <div class="text-gray-500 text-xs font-bold mb-1">🏦 累計入袋現金</div>
                <div class="text-2xl font-black text-blue-600" id="cardWithdrawn">--</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-5 border-b-4 border-purple-500">

        <!-- 主圖表：總淨值走勢 -->

        <!-- 每筆損益圖表 -->

            <h2 class="text-lg font-semibold mb-1 border-b pb-2">📊 每筆交易損益</h2>
            <p class="text-xs text-gray-400 mb-4">綠色為獲利、紅色為虧損</p>

                <canvas id="pnlChart"></canvas>

        <!-- 歷史紀錄表 -->
        <div class="bg-white rounded-xl shadow-md p-6 overflow-hidden">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">📋 資產變化紀錄</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-sm text-right">
                    <thead class="bg-gray-50 text-gray-600 border-b">
                        <tr>
                            <th class="p-3 text-left">#</th>
                            <th class="p-3 text-left">標的</th>
                            <th class="p-3">損益</th>
                            <th class="p-3">入袋現金</th>
                            <th class="p-3">帳戶餘額</th>
                            <th class="p-3 text-orange-600">總淨值</th>
                            <th class="p-3 text-purple-600">較上筆變化</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="7" class="p-6 text-center text-gray-400">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('themeIcon').innerText =
                document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
            loadSettings();
        });

        const SUPABASE_URL = 'https://uqbgpmnqrasvpnwvtjgo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_p1_pOL1tIeBp5Ksx-_LPDA_kh_QkQyZ';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        let trades = [];
        let currentUser = null;
        let currentTab = 'login';
        let netWorthChart = null;
        let pnlChart = null;

        // ── Auth UI ───────────────────────────────────────────
        function switchTab(tab) {
            currentTab = tab;
            const isLogin  = tab === 'login';
            const isSignup = tab === 'signup';
            const isForgot = tab === 'forgot';
            const isReset  = tab === 'reset';

            document.getElementById('authTabs').classList.toggle('hidden', isForgot || isReset);
            document.getElementById('tabLogin').className  = `flex-1 py-2 rounded-md font-semibold text-sm transition ${isLogin  ? 'bg-white shadow text-gray-900' : 'text-gray-500'}`;
            document.getElementById('tabSignup').className = `flex-1 py-2 rounded-md font-semibold text-sm transition ${isSignup ? 'bg-white shadow text-gray-900' : 'text-gray-500'}`;

            document.getElementById('authForm').classList.toggle('hidden', isForgot || isReset);
            document.getElementById('forgotPasswordLink').classList.toggle('hidden', !isLogin);
            document.getElementById('forgotSection').classList.toggle('hidden', !isForgot);
            document.getElementById('resetPasswordSection').classList.toggle('hidden', !isReset);

            if (!isForgot && !isReset) {
                document.getElementById('authBtn').innerText = isLogin ? '登入' : '建立帳號';
            }
            document.getElementById('authMessage').classList.add('hidden');
        }

        async function sendResetEmail() {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) { showForgotMsg('請輸入 Email', 'error'); return; }
            const btn = document.getElementById('forgotBtn');
            btn.disabled = true; btn.innerText = '寄送中...';
            const { error } = await db.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + window.location.pathname
            });
            btn.disabled = false; btn.innerText = '寄送重設連結';
            if (error) {
                showForgotMsg('寄送失敗：' + error.message, 'error');
            } else {
                showForgotMsg('重設連結已寄出！請檢查您的 Email（含垃圾信件夾）。', 'success');
            }
        }

        function showForgotMsg(text, type) {
            const div = document.getElementById('forgotMessage');
            div.innerText = text;
            div.className = type === 'error'
                ? 'text-red-500 text-sm bg-red-50 p-3 rounded-lg'
                : 'text-green-600 text-sm bg-green-50 p-3 rounded-lg';
            div.classList.remove('hidden');
        }

        async function updatePassword() {
            const newPwd     = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            if (newPwd.length < 6)     { showResetMsg('密碼至少需要 6 個字元', 'error'); return; }
            if (newPwd !== confirmPwd) { showResetMsg('兩次輸入的密碼不一致', 'error'); return; }
            const btn = document.getElementById('resetBtn');
            btn.disabled = true; btn.innerText = '更新中...';
            const { error } = await db.auth.updateUser({ password: newPwd });
            btn.disabled = false; btn.innerText = '更新密碼';
            if (error) {
                showResetMsg('更新失敗：' + error.message, 'error');
            } else {
                showResetMsg('✅ 密碼更新成功！', 'success');
                setTimeout(() => { document.getElementById('authModal').classList.add('hidden'); }, 1500);
            }
        }

        function showResetMsg(text, type) {
            const div = document.getElementById('resetMessage');
            div.innerText = text;
            div.className = type === 'error'
                ? 'text-red-500 text-sm bg-red-50 p-3 rounded-lg'
                : 'text-green-600 text-sm bg-green-50 p-3 rounded-lg';
            div.classList.remove('hidden');
        }

        async function handleAuth() {
            const email    = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const btn      = document.getElementById('authBtn');

            if (!email || !password) { showAuthMsg('請填寫 Email 和密碼', 'error'); return; }

            btn.disabled  = true;
            btn.innerText = '處理中...';

            const result = currentTab === 'login'
                ? await db.auth.signInWithPassword({ email, password })
                : await db.auth.signUp({ email, password });

            btn.disabled  = false;
            btn.innerText = currentTab === 'login' ? '登入' : '建立帳號';

            if (result.error) {
                showAuthMsg(result.error.message === 'Invalid login credentials' ? 'Email 或密碼錯誤' : result.error.message, 'error');
            } else if (currentTab === 'signup' && !result.data.session) {
                showAuthMsg('確認信已寄出！請確認 Email 後再登入。', 'success');
            }
        }

        function showAuthMsg(text, type) {
            const div = document.getElementById('authMessage');
            div.innerText = text;
            div.className = type === 'error'
                ? 'text-red-500 text-sm bg-red-50 p-3 rounded-lg'
                : 'text-green-600 text-sm bg-green-50 p-3 rounded-lg';
            div.classList.remove('hidden');
        }

        async function signOut() { await db.auth.signOut(); }

        db.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('authModal').classList.remove('hidden');
                switchTab('reset');
                return;
            }
            if (session && session.user) {
                currentUser = session.user;
                document.getElementById('authModal').classList.add('hidden');
                document.getElementById('userEmailDisplay').innerText = '👤 ' + currentUser.email;
                loadTrades();
            } else {
                currentUser = null;
                document.getElementById('authModal').classList.remove('hidden');
            }
        });

        // ── Data ──────────────────────────────────────────────
        async function loadTrades() {
            const { data, error } = await db
                .from('trades')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) { console.error(error); return; }

            trades = (data || []).map(t => ({
                id: t.id,
                symbol: t.symbol,
                contractSize: t.contract_size,
                quantity: t.quantity,
                entryPrice: t.entry_price,
                exitPrice: t.exit_price,
                marginTier: t.margin_tier,
                marginMultiple: t.margin_multiple,
                isShort: t.is_short || false
            }));

            renderAll();
        }

        function computeHistory() {
            const baseCapital    = parseFloat(document.getElementById('baseCapital').value) || 0;
            const withdrawalRate = parseFloat(document.getElementById('withdrawalRate').value) / 100 || 0;
            const feePerContract = parseFloat(document.getElementById('feePerContract').value) || 0;

            const history = [{
                label: '初始',
                pnl: 0,
                withdrawn: 0,
                balance: baseCapital,
                cumulativeWithdrawn: 0,
                totalNetWorth: baseCapital
            }];

            let balance           = baseCapital;
            let cumulativeWithdrawn = 0;
            let seq               = 1;

            trades
                .filter(t => t.exitPrice !== null && !isNaN(t.exitPrice))
                .forEach(t => {
                    const grossPnl = t.isShort
                        ? (t.entryPrice - t.exitPrice) * t.contractSize * t.quantity
                        : (t.exitPrice - t.entryPrice) * t.contractSize * t.quantity;
                    const fee      = feePerContract * t.quantity;
                    const pnl      = grossPnl - fee;
                    const withdrawn= pnl > 0 ? pnl * withdrawalRate : 0;
                    balance           += pnl - withdrawn;
                    cumulativeWithdrawn += withdrawn;

                    history.push({
                        label: `#${seq} ${t.symbol}`,
                        pnl,
                        withdrawn,
                        balance,
                        cumulativeWithdrawn,
                        totalNetWorth: balance + cumulativeWithdrawn
                    });
                    seq++;
                });

            return history;
        }

        function formatCurrency(num) {
            return Math.floor(num).toLocaleString('en-US');
        }

        // ── Settings Persistence ──────────────────────────────
        function saveSettings() {
            localStorage.setItem('setting_baseCapital',    document.getElementById('baseCapital').value);
            localStorage.setItem('setting_withdrawalRate', document.getElementById('withdrawalRate').value);
            localStorage.setItem('setting_feePerContract', document.getElementById('feePerContract').value);
        }

        function loadSettings() {
            const cap  = localStorage.getItem('setting_baseCapital');
            const rate = localStorage.getItem('setting_withdrawalRate');
            const fee  = localStorage.getItem('setting_feePerContract');
            if (cap)  document.getElementById('baseCapital').value = cap;
            if (rate) document.getElementById('withdrawalRate').value = rate;
            if (fee)  document.getElementById('feePerContract').value = fee;
        }

        // ── Render ────────────────────────────────────────────
        function renderAll() {
            saveSettings();
            const history = computeHistory();
            renderSummaryCards(history);
            renderNetWorthChart(history);
            renderPnlChart(history);
            renderTable(history);
        }

        function renderSummaryCards(history) {
            const last    = history[history.length - 1];
            const first   = history[0];
            const growth  = first.totalNetWorth > 0
                ? ((last.totalNetWorth - first.totalNetWorth) / first.totalNetWorth * 100)
                : 0;
            const growthEl = document.getElementById('cardGrowthRate');

            document.getElementById('cardTotalNetWorth').innerText = '$' + formatCurrency(last.totalNetWorth);
            document.getElementById('cardBalance').innerText       = '$' + formatCurrency(last.balance);
            document.getElementById('cardWithdrawn').innerText     = '$' + formatCurrency(last.cumulativeWithdrawn);
            growthEl.innerText     = (growth >= 0 ? '+' : '') + growth.toFixed(2) + '%';
            growthEl.className     = 'text-2xl font-black ' + (growth >= 0 ? 'text-green-600' : 'text-red-500');
        }

        function renderNetWorthChart(history) {
            const labels      = history.map(h => h.label);
            const balanceData = history.map(h => h.balance);
            const withdrawnData = history.map(h => h.cumulativeWithdrawn);
            const totalData   = history.map(h => h.totalNetWorth);

            if (netWorthChart) netWorthChart.destroy();

            const ctx = document.getElementById('netWorthChart').getContext('2d');
            netWorthChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        {
                            label: '帳戶餘額',
                            data: balanceData,
                            backgroundColor: 'rgba(34, 197, 94, 0.75)',
                            stack: 'stack'
                        },
                        {
                            label: '累計入袋現金',
                            data: withdrawnData,
                            backgroundColor: 'rgba(59, 130, 246, 0.75)',
                            stack: 'stack'
                        },
                        {
                            label: '總淨值',
                            data: totalData,
                            type: 'line',
                            borderColor: 'rgba(249, 115, 22, 1)',
                            backgroundColor: 'rgba(249, 115, 22, 0.1)',
                            borderWidth: 2.5,
                            pointBackgroundColor: 'rgba(249, 115, 22, 1)',
                            pointRadius: 4,
                            tension: 0.3,
                            fill: false,
                            order: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { stacked: true },
                        y: {
                            stacked: true,
                            ticks: {
                                callback: v => v >= 10000 ? (v / 10000).toFixed(0) + '萬' : v
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: ctx => ` ${ctx.dataset.label}: $${formatCurrency(ctx.raw)}`
                            }
                        }
                    }
                }
            });
        }

        function renderPnlChart(history) {
            const data   = history.slice(1);
            const labels = data.map(h => h.label);
            const pnls   = data.map(h => h.pnl);
            const colors = pnls.map(v => v >= 0 ? 'rgba(34, 197, 94, 0.8)' : 'rgba(239, 68, 68, 0.8)');

            if (pnlChart) pnlChart.destroy();

            const ctx = document.getElementById('pnlChart').getContext('2d');
            pnlChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: '損益',
                        data: pnls,
                        backgroundColor: colors,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const v = ctx.raw;
                                    return ` ${v >= 0 ? '+' : ''}$${formatCurrency(v)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: v => (v >= 0 ? '+' : '') + (v >= 10000 || v <= -10000 ? (v/10000).toFixed(1) + '萬' : v)
                            }
                        }
                    }
                }
            });
        }

        function renderTable(history) {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            if (history.length <= 1) {
                tbody.innerHTML = '<tr><td colspan="7" class="p-6 text-center text-gray-400">尚無已平倉的交易紀錄。</td></tr>';
                return;
            }

            [...history].reverse().forEach((h, revIdx) => {
                const origIdx = history.length - 1 - revIdx;
                const prev    = origIdx > 0 ? history[origIdx - 1] : null;
                const delta   = prev !== null ? h.totalNetWorth - prev.totalNetWorth : 0;
                const isInit  = origIdx === 0;

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition border-b border-gray-100';

                const pnlClass   = h.pnl > 0 ? 'text-green-600 font-bold' : (h.pnl < 0 ? 'text-red-500 font-bold' : 'text-gray-400');
                const deltaClass = delta > 0 ? 'text-purple-600 font-bold' : (delta < 0 ? 'text-red-500 font-bold' : 'text-gray-400');
                const deltaText  = isInit ? '-' : (delta >= 0 ? '+' : '') + '$' + formatCurrency(delta);
                const pnlText    = isInit ? '-' : (h.pnl >= 0 ? '+' : '') + '$' + formatCurrency(h.pnl);
                const withdrawnText = isInit || h.withdrawn === 0 ? '-' : '+$' + formatCurrency(h.withdrawn);

                tr.innerHTML = `
                    <td class="p-3 text-left text-gray-400 font-medium">${isInit ? '—' : origIdx}</td>
                    <td class="p-3 text-left font-semibold text-gray-700">${h.label}</td>
                    <td class="p-3 ${pnlClass}">${pnlText}</td>
                    <td class="p-3 text-blue-600">${withdrawnText}</td>
                    <td class="p-3 text-gray-700 font-medium">$${formatCurrency(h.balance)}</td>
                    <td class="p-3 font-bold text-orange-500">$${formatCurrency(h.totalNetWorth)}</td>
                    <td class="p-3 ${deltaClass}">${deltaText}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
